<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Three.js – Lighting & Shadows</title>
    <style>
      html, body { height: 100%; margin: 0; }
      #c { width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
          
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three":          "https://unpkg.com/three@0.182.0/build/three.module.js",
          "three/addons/":  "https://unpkg.com/three@0.182.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { GUI }           from 'three/addons/libs/lil-gui.module.min.js';

      function main() {
        const canvas = document.querySelector('#c');

        // ── Renderer ────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

        // ── Camera ───────────────────────────────────────────────────
        const camera = new THREE.PerspectiveCamera(75, 2, 0.1, 100);
        camera.position.set(6, 5, 7);
        camera.lookAt(0, 1, 0);

        const controls = new OrbitControls(camera, renderer.domElement);

        // ── Scene ────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x888888);

        // ============================================================
        // LIGHTING
        // ============================================================

        // 1. Ambient – soft fill so shadows are never pitch black
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
        scene.add(ambientLight);

        // 2. SpotLight – ceiling lamp above table (main shadow caster)
        const spotLight = new THREE.SpotLight(0xfff5e0, 6);
        spotLight.position.set(0, 4.8, 0);
        spotLight.angle    = Math.PI / 7;
        spotLight.penumbra = 0.25;
        spotLight.decay    = 1.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.set(2048, 2048);
        spotLight.shadow.bias       = -0.001;
        spotLight.shadow.normalBias =  0.02;
        spotLight.target.position.set(0, 0, 0);
        scene.add(spotLight);
        scene.add(spotLight.target);

        // Ceiling fixture mesh (purely visual)
        const lampBase = new THREE.Mesh(
          new THREE.CylinderGeometry(0.08, 0.18, 0.22, 20),
          new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffcc, emissiveIntensity: 0.6 })
        );
        lampBase.position.set(0, 4.78, 0);
        scene.add(lampBase);

        // SpotLight helper (hidden by default, toggle via GUI)
        const spotHelper = new THREE.SpotLightHelper(spotLight);
        spotHelper.visible = false;
        scene.add(spotHelper);

        // 3. Subtle fill – no shadows, just prevents totally dark walls
        const fillLight = new THREE.DirectionalLight(0x8899cc, 0.3);
        fillLight.position.set(-4, 6, -4);
        scene.add(fillLight);

        // ============================================================
        // ROOM
        // ============================================================
        const floorTexture = new THREE.TextureLoader().load(
          'depositphotos_138660494-stock-photo-black-marble-floor-texture-and.jpg'
        );
        floorTexture.wrapS = THREE.RepeatWrapping;
        floorTexture.wrapT = THREE.RepeatWrapping;
        floorTexture.repeat.set(4, 4);

        const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture });
        const floor    = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
        floor.rotation.x   = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const backWall = new THREE.Mesh(
          new THREE.PlaneGeometry(10, 5),
          new THREE.MeshStandardMaterial({ color: 0xcccccc, side: THREE.DoubleSide })
        );
        backWall.position.set(0, 2.5, -5);
        backWall.receiveShadow = true;
        scene.add(backWall);

        const leftWall = new THREE.Mesh(
          new THREE.PlaneGeometry(10, 5),
          new THREE.MeshStandardMaterial({ color: 0xbbbbbb, side: THREE.DoubleSide })
        );
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-5, 2.5, 0);
        leftWall.receiveShadow = true;
        scene.add(leftWall);

        // ============================================================
        // TABLE
        // ============================================================
        const tableWidth = 4, tableDepth = 2, tableThickness = 0.2, tableHeight = 1.2;

        const tableMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.1 });

        const tableTop = new THREE.Mesh(new THREE.BoxGeometry(tableWidth, tableThickness, tableDepth), tableMat);
        tableTop.position.y  = tableHeight;
        tableTop.castShadow  = true;
        tableTop.receiveShadow = true;
        scene.add(tableTop);

        const legGeo = new THREE.CylinderGeometry(0.1, 0.1, tableHeight, 32);
        const ox = tableWidth / 2 - 0.2, oz = tableDepth / 2 - 0.2;
        [[ox,oz],[-ox,oz],[ox,-oz],[-ox,-oz]].forEach(([x, z]) => {
          const leg = new THREE.Mesh(legGeo, tableMat);
          leg.position.set(x, tableHeight / 2, z);
          leg.castShadow    = true;
          leg.receiveShadow = true;
          scene.add(leg);
        });

        // ============================================================
        // OBJECTS ON TABLE
        // ============================================================
        const cupMat = new THREE.MeshStandardMaterial({
          color: 0xffffff, transparent: true, opacity: 0.45,
          roughness: 0.05, metalness: 0.1
        });
        const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.3, 32), cupMat);
        cup.position.y = tableHeight + tableThickness / 2 + 0.15;
        cup.castShadow = true;
        scene.add(cup);

        const plateMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
        const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.05, 32), plateMat);
        plate.position.set(0.7, tableHeight + tableThickness / 2 + 0.025, 0);
        plate.castShadow    = true;
        plate.receiveShadow = true;
        scene.add(plate);

        // ============================================================
        // CHAIRS
        // ============================================================
        const chairSeatGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.08, 32);
        const chairBackGeo = new THREE.BoxGeometry(0.7, 0.7, 0.06);
        const chairLegGeo  = new THREE.CylinderGeometry(0.04, 0.04, 0.75, 16);
        const chairMat     = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.8 });
        const chairLegMat  = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.1 });

        function createChair(x, z, rotY) {
          const group = new THREE.Group();

          const addMesh = (geo, mat, px, py, pz) => {
            const m = new THREE.Mesh(geo, mat);
            m.position.set(px ?? 0, py ?? 0, pz ?? 0);
            m.castShadow    = true;

            m.receiveShadow = true;
            group.add(m);
            return m;
          };

          addMesh(chairSeatGeo, chairMat, 0, 0.75, 0);
          addMesh(chairBackGeo, chairMat, 0, 1.15, -0.32);
          const lx = 0.25, lz = 0.25;
          [[lx,lz],[-lx,lz],[lx,-lz],[-lx,-lz]].forEach(([cx,cz]) =>
            addMesh(chairLegGeo, chairLegMat, cx, 0.375, cz)
          );

          group.position.set(x, 0, z);
          group.rotation.y = rotY;
          scene.add(group);
        }

        createChair(0,    2.2,  Math.PI);
        createChair(0,   -2.2,  0);
        createChair(-2.4, 0,    Math.PI / 2);
        createChair( 2.4, 0,   -Math.PI / 2);

        // ============================================================
        // ROBOT
        // ============================================================
        const robotBodyMat = new THREE.MeshStandardMaterial({ color: 0x4488cc, metalness: 0.7, roughness: 0.3 });
        const jointMat     = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.15 });
        const eyeMat       = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x008888, emissiveIntensity: 1.0 });

        const robotRoot = new THREE.Group();
        robotRoot.position.set(3.8, 0, 0);
        robotRoot.rotation.y = -Math.PI / 2;
        scene.add(robotRoot);

        // Helper: create mesh, add to parent, enable shadows
        function mkMesh(geo, mat, parent, px = 0, py = 0, pz = 0) {
          const m = new THREE.Mesh(geo, mat);
          m.position.set(px, py, pz);
          m.castShadow    = true;
          m.receiveShadow = true;
          parent.add(m);
          return m;
        }

        // Legs
        const legH = 0.9, legRad = 0.11;
        [-0.16, 0.16].forEach(x =>
          mkMesh(new THREE.CylinderGeometry(legRad, legRad * 1.2, legH, 16), robotBodyMat, robotRoot, x, legH / 2, 0)
        );

        // Hips
        const hipsH = 0.38;
        mkMesh(new THREE.BoxGeometry(0.55, hipsH, 0.38), robotBodyMat, robotRoot, 0, legH + hipsH / 2, 0);

        // Torso group
        const torsoGroup = new THREE.Group();
        torsoGroup.position.y = legH + hipsH;
        robotRoot.add(torsoGroup);

        const torsoH = 0.85;
        mkMesh(new THREE.BoxGeometry(0.68, torsoH, 0.4), robotBodyMat, torsoGroup, 0, torsoH / 2, 0);

        // Head group
        const headGroup = new THREE.Group();
        headGroup.position.y = torsoH;
        torsoGroup.add(headGroup);
        headGroup.add(new THREE.AxesHelper(0.28));

        const headH = 0.38;
        mkMesh(new THREE.BoxGeometry(0.42, headH, 0.38), robotBodyMat, headGroup, 0, headH / 2, 0);

        // Eyes
        [-0.1, 0.1].forEach(ex =>
          mkMesh(new THREE.SphereGeometry(0.055, 10, 10), eyeMat, headGroup, ex, headH / 2 + 0.02, 0.19)
        );

        // Antennas (two)
        [-0.1, 0.1].forEach(ax => {
          mkMesh(new THREE.CylinderGeometry(0.02, 0.02, 0.22, 8), jointMat, headGroup, ax, headH + 0.11, 0);
          mkMesh(new THREE.SphereGeometry(0.04, 8, 8), eyeMat, headGroup, ax, headH + 0.24, 0);
        });

        // Arm builder
        function buildArm(side) {
          const sign      = side === 'left' ? -1 : 1;
          const shoulderX = sign * (0.68 / 2 + 0.09);

          const shoulderGroup = new THREE.Group();
          shoulderGroup.position.set(shoulderX, torsoH - 0.14, 0);
          torsoGroup.add(shoulderGroup);
          shoulderGroup.add(new THREE.AxesHelper(0.22));
          mkMesh(new THREE.SphereGeometry(0.09, 12, 12), jointMat, shoulderGroup);

          const upperArmH = 0.52;
          mkMesh(new THREE.BoxGeometry(0.15, upperArmH, 0.15), robotBodyMat, shoulderGroup, 0, -upperArmH / 2, 0);

          const elbowGroup = new THREE.Group();
          elbowGroup.position.y = -upperArmH;
          shoulderGroup.add(elbowGroup);
          elbowGroup.add(new THREE.AxesHelper(0.18));
          mkMesh(new THREE.SphereGeometry(0.07, 12, 12), jointMat, elbowGroup);

          const forearmH = 0.46;
          mkMesh(new THREE.BoxGeometry(0.12, forearmH, 0.12), robotBodyMat, elbowGroup, 0, -forearmH / 2, 0);

          const handGroup = new THREE.Group();
          handGroup.position.y = -forearmH;
          elbowGroup.add(handGroup);
          handGroup.add(new THREE.AxesHelper(0.15));
          mkMesh(new THREE.BoxGeometry(0.22, 0.13, 0.09), robotBodyMat, handGroup, 0, -0.065, 0);
          [-0.08, 0.08].forEach(fx =>
            mkMesh(new THREE.BoxGeometry(0.05, 0.14, 0.05), jointMat, handGroup, fx, -0.2, 0)
          );

          shoulderGroup.rotation.z = sign * 0.35;
          elbowGroup.rotation.z    = sign * 0.28;

          return { shoulderGroup, elbowGroup, handGroup };
        }

        const leftArm  = buildArm('left');
        const rightArm = buildArm('right');

        // ============================================================
        // GUI
        // ============================================================
        const gui = new GUI({ title: 'Scene Controls' });

        // — Ambient Light —
        const ambFolder = gui.addFolder('Ambient Light');
        ambFolder.add(ambientLight, 'intensity', 0, 2, 0.01).name('Intensity');
        const ambParams = { color: '#ffffff' };
        ambFolder.addColor(ambParams, 'color').name('Color')
          .onChange(v => ambientLight.color.set(v));

        // — Spot Light —
        const spotFolder = gui.addFolder('Spot Light (Ceiling Lamp)');
        spotFolder.add(spotLight, 'intensity', 0, 15, 0.1).name('Intensity');
        const spotParams = { color: '#fff5e0' };
        spotFolder.addColor(spotParams, 'color').name('Color')
          .onChange(v => spotLight.color.set(v));
        spotFolder.add(spotLight, 'angle', 0.05, Math.PI / 3, 0.01).name('Angle (rad)')
          .onChange(() => spotHelper.update());
        spotFolder.add(spotLight, 'penumbra', 0, 1, 0.01).name('Penumbra');
        spotFolder.add(spotLight, 'decay', 0, 3, 0.05).name('Decay');
        spotFolder.add(spotLight, 'castShadow').name('Cast Shadow');
        const shadowSizes = { '512': 512, '1024': 1024, '2048': 2048, '4096': 4096 };
        const shadowParams = { mapSize: '2048' };
        spotFolder.add(shadowParams, 'mapSize', Object.keys(shadowSizes)).name('Shadow Map Size')
          .onChange(v => {
            const s = shadowSizes[v];
            spotLight.shadow.mapSize.set(s, s);
            if (spotLight.shadow.map) { spotLight.shadow.map.dispose(); spotLight.shadow.map = null; }
          });
        spotFolder.add(spotHelper, 'visible').name('Show Helper');

        // — Robot Body —
        const robotFolder = gui.addFolder('Robot Body Material');
        const robotParams = { color: '#4488cc' };
        robotFolder.addColor(robotParams, 'color').name('Color')
          .onChange(v => robotBodyMat.color.set(v));
        robotFolder.add(robotBodyMat, 'metalness', 0, 1, 0.01).name('Metalness');
        robotFolder.add(robotBodyMat, 'roughness', 0, 1, 0.01).name('Roughness');

        // — Robot Joints —
        const jointFolder = gui.addFolder('Robot Joint Material');
        const jointParams = { color: '#222222' };
        jointFolder.addColor(jointParams, 'color').name('Color')
          .onChange(v => jointMat.color.set(v));
        jointFolder.add(jointMat, 'metalness', 0, 1, 0.01).name('Metalness');
        jointFolder.add(jointMat, 'roughness', 0, 1, 0.01).name('Roughness');

        // — Eye / Emissive —
        const eyeFolder = gui.addFolder('Robot Eyes / Antennas');
        const eyeParams = { color: '#00ffff', emissive: '#008888' };
        eyeFolder.addColor(eyeParams, 'color').name('Color')
          .onChange(v => eyeMat.color.set(v));
        eyeFolder.addColor(eyeParams, 'emissive').name('Emissive')
          .onChange(v => eyeMat.emissive.set(v));
        eyeFolder.add(eyeMat, 'emissiveIntensity', 0, 3, 0.05).name('Emissive Intensity');

        // — Table —
        const tableFolder = gui.addFolder('Table Material');
        tableFolder.add(tableMat, 'metalness', 0, 1, 0.01).name('Metalness');
        tableFolder.add(tableMat, 'roughness', 0, 1, 0.01).name('Roughness');

        // — Floor —
        const floorFolder = gui.addFolder('Floor Material');
        floorFolder.add(floorMat, 'roughness', 0, 1, 0.01).name('Roughness');
        floorFolder.add(floorMat, 'metalness', 0, 1, 0.01).name('Metalness');

        // ============================================================
        // RENDER LOOP
        // ============================================================
        const clock = new THREE.Clock();

        function resizeRendererToDisplaySize(renderer) {
          const canvas = renderer.domElement;
          const w = canvas.clientWidth, h = canvas.clientHeight;
          const needResize = canvas.width !== w || canvas.height !== h;
          if (needResize) renderer.setSize(w, h, false);
          return needResize;
        }

        function render() {
          if (resizeRendererToDisplaySize(renderer)) {
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
          }

          const t = clock.getElapsedTime();

          // Robot animation (scene graph hierarchy demo)
          // headGroup.rotation.y                = Math.sin(t * 0.8)  * 0.4;
          // rightArm.shoulderGroup.rotation.x   = Math.sin(t * 1.2)  * 0.5 - 0.3;
          // rightArm.elbowGroup.rotation.x      = Math.abs(Math.sin(t * 1.2)) * 0.6 - 0.28;
          // leftArm.shoulderGroup.rotation.x    = Math.sin(t * 0.6 + 1) * 0.1;

          if (spotHelper.visible) spotHelper.update();

          controls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
      }

      main();
    </script>
  </body>
</html>
